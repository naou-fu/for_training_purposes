<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <main>
        <h1 id="myh1">Rock Paper Scissors</h1>

        <h1 id="name"></h1>
        
        <label id="label-username" for="username">Username</label>
        
        <input type="text" id="username" placeholder="Enter your username">
        <button id="btn-submit" class="btn-click">submit</button>
        <h1 id="greeting"></h1>
        <div id="score-container">
            <h3 id="player-results">Your Tries: 0</h3>
            <h3 id="computer-results">My Tries: 0</h3>
        </div>
        <br>
        <br>
        <div id="btn-container">
            <button class="choice" value="scissors" id="btn1">✌️</button>
            <button class="choice" value="paper" id="btn2">✋</button>
            <button class="choice" value="rock" id="btn3">✊</button>
        </div>
        <h1 id="result"></h1>
        <h1 id="choice"></h1>
    </main>
    <script type="module" src="../script/main.js">
        
    </script>
</body>
</html>
